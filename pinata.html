<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Make a Piñata!</title>
    <style>
        :root {
            --primary: #FF4081;
            --sky: #A7FFEB;
            --yellow: #FFD54F;
        }

        body {
            margin: 0;
            font-family: 'Comic Sans MS', cursive;
            background-color: var(--sky);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-wrapper {
            width: 980px;
            height: 680px;
            background: white;
            border: 10px solid var(--yellow);
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        #header-word {
            font-size: 2.5rem;
            color: white;
            background: var(--primary);
            padding: 15px 40px;
            border-radius: 0 0 30px 30px;
            text-shadow: 2px 2px #000;
            text-align: center;
            width: 70%;
            z-index: 10;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            box-sizing: border-box;
        }

        .active { display: flex; }

        /* --- BUILD STAGE --- */
        #drop-zone {
            width: 350px;
            height: 350px;
            border: 8px dashed #ccc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #fafafa;
        }

        .inventory {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            background: #f0f0f0;
            padding: 20px;
            border-radius: 20px;
            width: 95%;
        }

        .draggable-item {
            background: white;
            padding: 10px;
            border-radius: 15px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid var(--yellow);
        }

        .draggable-item img { width: 60px; height: 60px; pointer-events: none; }
        .draggable-item label { font-size: 12px; font-weight: bold; margin-top: 5px; pointer-events: none; }

        /* --- MIXING ANIMATION --- */
        @keyframes mixingEffect {
            0% { transform: rotate(0deg) scale(1); filter: blur(0px); }
            50% { transform: rotate(720deg) scale(1.3); filter: blur(15px); }
            100% { transform: rotate(1440deg) scale(0); filter: blur(20px); opacity: 0; }
        }

        .mixing-active { animation: mixingEffect 2s forwards; }

        /* --- BREAK STAGE --- */
        #hit-area { width: 450px; height: 450px; position: relative; cursor: pointer; }
        #pinata-final { width: 320px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #stick { width: 160px; position: absolute; right: -20px; top: 40%; transform-origin: bottom right; transition: 0.1s; pointer-events: none; }
        
        .swing { animation: swingAnim 3s ease-in-out infinite; transform-origin: top center; }
        @keyframes swingAnim {
            0%, 100% { transform: translate(-50%, -50%) rotate(-15deg); }
            50% { transform: translate(-50%, -50%) rotate(15deg); }
        }

        .confetti { position: absolute; width: 12px; height: 12px; z-index: 100; }
        .big-btn {
            padding: 25px 60px;
            font-size: 2.5rem;
            background: #4CAF50;
            color: white;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px #2E7D32;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="header-word">LET'S MAKE A PIÑATA!</div>
    <div id="x-mark" style="position:absolute; font-size:180px; color:red; display:none; z-index:100; top:50%; left:50%; transform:translate(-50%, -50%); pointer-events:none;">❌</div>

    <section id="start-screen" class="screen active">
        <h1 style="color: var(--primary); font-size: 3.5rem;">Are you ready?</h1>
        <button class="big-btn" onclick="initGame()">START</button>
    </section>

    <section id="build-screen" class="screen">
        <div id="drop-zone">
            <div id="visual-stack" style="position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;"></div>
            <p style="color: #ddd; font-weight: bold;">DRAG HERE</p>
        </div>
        <div class="inventory" id="inventory"></div>
    </section>

    <section id="break-screen" class="screen">
        <h2 id="turn-text" style="font-size: 2rem; background: #FFF176; padding: 10px 40px; border-radius: 50px; border: 4px solid #FBC02D;">Player 1: HIT IT!</h2>
        <div id="hit-area" onclick="handleHit()">
            <img id="pinata-final" src="pinata.png" class="swing">
            <img id="stick" src="stick.png">
        </div>
    </section>

    <section id="win-screen" class="screen">
        <h1 style="font-size: 4rem; color: var(--primary);">YOU DID IT! 🎉</h1>
        <button class="big-btn" onclick="location.reload()">PLAY AGAIN</button>
    </section>
</div>

<script>
    const vocab = [
        { id: 'balloons', name: 'BALLOONS', img: 'balloon.png' },
        { id: 'newspaper', name: 'NEWSPAPER', img: 'newspaper.png' },
        { id: 'glue', name: 'GLUE', img: 'glue.png' },
        { id: 'tape', name: 'TAPE', img: 'tape.png' },
        { id: 'boxes', name: 'BOXES', img: 'boxes.png' },
        { id: 'bottles', name: 'BOTTLES', img: 'bottles.png' },
        { id: 'string', name: 'STRING', img: 'string.png' },
        { id: 'paint', name: 'PAINT', img: 'paint.png' },
        { id: 'candies', name: 'CANDIES', img: 'candies.png', distractor: true },
        { id: 'sticks', name: 'STICKS', img: 'sticks.png', distractor: true },
        { id: 'shoe', name: 'SHOE', img: 'shoe.png', distractor: true },
        { id: 'apple', name: 'APPLE', img: 'apple.png', distractor: true }
    ];

    const steps = ["balloons", "newspaper", "glue", "tape", "boxes", "bottles", "string", "paint"];
    let currentStep = 0;
    let player = 1;
    let hits = 0;

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'en-US';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function playApplause() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        // Simulación de aplausos con ruido blanco
        const bufferSize = ctx.sampleRate * 1.5;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1200;
        
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        noise.start();
    }

    function initGame() {
        showScreen('build-screen');
        renderInventory();
        updateTarget();
    }

    function renderInventory() {
        const inv = document.getElementById('inventory');
        inv.innerHTML = '';
        [...vocab].sort(() => Math.random() - 0.5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'draggable-item';
            div.draggable = true;
            div.setAttribute('data-id', item.id);
            div.innerHTML = `<img src="${item.img}"><label>${item.name}</label>`;
            div.ondragstart = (e) => e.dataTransfer.setData("text/plain", item.id);
            inv.appendChild(div);
        });
    }

    function updateTarget() {
        const itemNeeded = steps[currentStep];
        const labelName = vocab.find(v => v.id === itemNeeded).name;
        document.getElementById('header-word').innerText = "I NEED: " + labelName;
        speak("I need " + labelName);
    }

    const dropZone = document.getElementById('drop-zone');
    dropZone.ondragover = (e) => e.preventDefault();
    dropZone.ondrop = (e) => {
        e.preventDefault();
        const droppedId = e.dataTransfer.getData("text/plain");
        if (droppedId === steps[currentStep]) {
            handleSuccess(droppedId);
        } else {
            document.getElementById('x-mark').style.display = 'block';
            setTimeout(() => document.getElementById('x-mark').style.display = 'none', 600);
            speak("No");
        }
    };

    function handleSuccess(id) {
        document.querySelectorAll('.draggable-item').forEach(el => {
            if(el.getAttribute('data-id') === id) el.style.visibility = 'hidden';
        });

        const stack = document.getElementById('visual-stack');
        const img = document.createElement('img');
        img.src = id === 'balloons' ? 'balloon.png' : id + ".png"; // Mapeo de ID a archivo
        img.style.width = "120px";
        img.style.position = "absolute";
        img.style.transform = `rotate(${Math.random() * 360}deg)`;
        stack.appendChild(img);

        currentStep++;
        if (currentStep >= steps.length) {
            document.getElementById('header-word').innerText = "MIXING!";
            stack.classList.add('mixing-active');
            setTimeout(() => {
                showScreen('break-screen');
                speak("Break the piñata!");
            }, 2100);
        } else {
            updateTarget();
        }
    }

    function handleHit() {
        hits++;
        // Sonido de golpe seco (THUD)
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.setValueAtTime(100, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.start(); osc.stop(ctx.currentTime + 0.2);

        const stick = document.getElementById('stick');
        stick.style.transform = "rotate(-80deg)";
        setTimeout(() => stick.style.transform = "rotate(0deg)", 100);

        if (hits % 3 === 0 && player < 10) {
            player++;
            document.getElementById('turn-text').innerText = "Player " + player + ": HIT IT!";
        }

        if (hits >= 30) {
            showScreen('win-screen');
            playApplause(); // Aplausos en lugar de voz robótica
            createConfetti();
        }
    }

    function createConfetti() {
        for (let i = 0; i < 120; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + "vw";
            c.style.top = "-20px";
            c.style.backgroundColor = ["#ff4081", "#ffd54f", "#a7ffeb", "#ff5722"][Math.floor(Math.random() * 4)];
            document.body.appendChild(c);
            let pos = -20;
            let timer = setInterval(() => {
                pos += Math.random() * 6 + 3;
                c.style.top = pos + "px";
                if (pos > window.innerHeight) { clearInterval(timer); c.remove(); }
            }, 20);
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
